name: Deploy KripChat to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    env:
      PAGES_ADMIN_PAT: ${{ secrets.PAGES_ADMIN_PAT }}
      EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare web build metadata
        run: |
          echo "EXPO_PUBLIC_APP_VERSION=$(node -p "require('./app.json').expo.version")" >> "$GITHUB_ENV"
          echo "EXPO_PUBLIC_WEB_BUILD_NUMBER=${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"
          echo "EXPO_PUBLIC_GIT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:unit

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Web QA smoke tests
        run: npm run test:qa

      - name: Cucumber BDD QA tests
        run: npm run test:bdd

      - name: Upload Cucumber BDD report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-bdd-report-pages
          path: test-results/cucumber-report.html
          if-no-files-found: ignore

      - name: Export Expo web app
        run: npm run web:export

      - name: Ensure SPA fallback on GitHub Pages
        run: cp dist/index.html dist/404.html

      - name: Setup Pages (auto-enable with PAT)
        if: ${{ env.PAGES_ADMIN_PAT != '' }}
        uses: actions/configure-pages@v5
        with:
          enablement: true
          token: ${{ env.PAGES_ADMIN_PAT }}

      - name: Setup Pages (default token)
        if: ${{ env.PAGES_ADMIN_PAT == '' }}
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
