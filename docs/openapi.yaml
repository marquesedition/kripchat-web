          type: object
    PasswordGrantRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          description: Internal generated auth email derived from `hacker_handle`.
          example: operator@kripchat.invalid
        password:
          type: string
          format: password
    AuthResponse:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        expires_in:
          type: integer
        token_type:
          type: string
