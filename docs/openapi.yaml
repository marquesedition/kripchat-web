openapi: 3.1.0
info:
  title: KripChat Client API Surface
  version: 1.0.0
  description: |
    Swagger/OpenAPI inventory for the HTTP APIs used by the KripChat Expo app.

    KripChat is a Supabase client app. Most calls are generated by supabase-js
    against Supabase Auth, PostgREST, RPC, and Storage endpoints. Supabase
    Realtime is WebSocket-based, so it is documented in `x-supabase-realtime`
    instead of normal HTTP `paths`.

    Privacy note: message plaintext must never be sent to Supabase. Message
    bodies are encrypted before insert; `encrypted_messages.ciphertext` is one
    encrypted envelope per recipient device.
servers:
  - url: https://bmvbqmibvfsbkfkcdesv.supabase.co
    description: KripChat Supabase project
  - url: https://exp.host
    description: Expo Push API
security:
  - SupabaseAnonKey: []
  - SupabaseJwt: []
tags:
  - name: Auth
  - name: Profiles
  - name: Conversations
  - name: LegacyMessages
  - name: DeviceEncryptedMessages
  - name: Devices
  - name: Blocks
  - name: Storage
  - name: Audit
  - name: ExpoPush
paths:
  /auth/v1/signup:
    post:
      tags: [Auth]
      summary: Register with hacker_handle/password via Supabase Auth
      description: |
        Product UI asks for `hacker_handle` and password only. The client derives a
        private internal auth email with `getAuthEmailForUsername` because
        Supabase's password provider still expects an `email` field.
      security:
        - SupabaseAnonKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignUpRequest"
      responses:
        "200":
          description: Supabase Auth signup response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          $ref: "#/components/responses/AuthError"
  /auth/v1/token:
    post:
      tags: [Auth]
      summary: Sign in with hacker_handle/password via Supabase Auth
      description: |
        Called by `supabase.auth.signInWithPassword`. Product UI asks for
        `hacker_handle`; the client sends the deterministic internal email to
        Supabase.
      security:
        - SupabaseAnonKey: []
      parameters:
        - in: query
          name: grant_type
          required: true
          schema:
            type: string
            enum: [password, pkce]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: "#/components/schemas/PasswordGrantRequest"
                - type: object
                  required: [auth_code]
                  properties:
                    auth_code:
                      type: string
            examples:
              handlePassword:
                value:
                  email: operator@kripchat.invalid
                  password: correct-horse-battery-staple
      responses:
        "200":
          description: Auth session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          $ref: "#/components/responses/AuthError"
  /auth/v1/logout:
    post:
      tags: [Auth]
      summary: Sign out current session
      security:
        - SupabaseJwt: []
      responses:
        "204":
          description: Signed out
        "401":
          $ref: "#/components/responses/AuthError"
  /auth/v1/user:
    get:
      tags: [Auth]
      summary: Get current authenticated user
      security:
        - SupabaseJwt: []
      responses:
        "200":
          description: Current auth user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          $ref: "#/components/responses/AuthError"
  /auth/v1/verify:
    post:
      tags: [Auth]
      summary: Verify email OTP
      description: "Used by the `/auth/confirm` route when `token_hash` is present."
      security:
        - SupabaseAnonKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token_hash, type]
              properties:
                token_hash:
                  type: string
                type:
                  type: string
                  enum: [email]
      responses:
        "200":
          description: Verified session or user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
  /rest/v1/profiles:
    get:
      tags: [Profiles]
      summary: Get profile by user id
      security:
        - SupabaseJwt: []
      parameters:
        - $ref: "#/components/parameters/Select"
        - in: query
          name: id
          schema:
            type: string
            example: eq.00000000-0000-0000-0000-000000000000
      responses:
        "200":
          description: Matching profiles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Profile"
    post:
      tags: [Profiles]
      summary: Create profile
      security:
        - SupabaseJwt: []
      parameters:
        - $ref: "#/components/parameters/PreferReturnRepresentation"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileCreate"
      responses:
        "201":
          description: Created profile
    patch:
      tags: [Profiles]
      summary: Update own profile, presence, push token, or public E2EE key
      security:
        - SupabaseJwt: []
      parameters:
        - in: query
          name: id
          schema:
            type: string
            example: eq.{auth.user.id}
        - $ref: "#/components/parameters/PreferReturnRepresentation"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileUpdate"
      responses:
        "200":
          description: Updated profile
  /rest/v1/rpc/search_profiles_by_username_v2:
    post:
      tags: [Profiles]
      summary: Search users by username without exposing email
      security:
        - SupabaseJwt: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [search_username]
              properties:
                search_username:
                  type: string
                  example: alice
      responses:
        "200":
          description: Public profile search results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PublicProfileSearchResult"

  /rest/v1/rpc/create_direct_conversation_by_username:
    post:
      tags: [Conversations]
      summary: Compatibility endpoint for direct conversations by username
      description: Returns an existing accepted conversation UUID. For new peers this now creates/reuses a pending chat request and responds with an API error message instead of auto-adding both users.
      security:
        - SupabaseJwt: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [peer_username]
              properties:
                peer_username:
                  type: string
                  example: bob
      responses:
        "200":
          description: Existing accepted conversation UUID
          content:
            application/json:
              schema:
                type: string
                format: uuid
        "400":
          description: Chat request is pending
  /rest/v1/rpc/create_direct_conversation_v2:
    post:
      tags: [Conversations]
      summary: Compatibility endpoint for direct conversations by profile ID
      description: Returns an existing accepted conversation UUID. For new peers this now creates/reuses a pending chat request and responds with an API error message instead of auto-adding both users.
      security:
        - SupabaseJwt: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [peer_id]
              properties:
                peer_id:
                  type: string
                  format: uuid
      responses:
        "200":
          description: Existing accepted conversation UUID
          content:
            application/json:
              schema:
                type: string
                format: uuid
        "400":
          description: Chat request is pending
  /rest/v1/rpc/request_direct_conversation_by_username:
    post:
      tags: [Conversations]
      summary: Request a direct chat by username
      description: Creates or reuses a pending chat request. If both users already share an accepted direct chat, returns that conversation ID.
      security:
        - SupabaseJwt: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [peer_username]
              properties:
                peer_username:
                  type: string
                  example: bob
      responses:
        "200":
          description: Request state
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DirectConversationRequestResult"
  /rest/v1/rpc/list_chat_requests:
    post:
      tags: [Conversations]
      summary: List pending and recent chat request activity
      description: Returns inbound pending requests plus outbound pending/rejected activity for the signed-in user.
      security:
        - SupabaseJwt: []
      responses:
        "200":
          description: Chat request inbox rows
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChatRequest"
  /rest/v1/rpc/accept_chat_request:
    post:
      tags: [Conversations]
      summary: Accept an inbound chat request
      description: Creates the direct conversation, adds both users to the chat list, and marks the request accepted.
      security:
        - SupabaseJwt: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [p_request_id]
              properties:
                p_request_id:
                  type: string
                  format: uuid
      responses:
        "200":
          description: Conversation UUID
          content:
            application/json:
              schema:
                type: string
                format: uuid
  /rest/v1/rpc/reject_chat_request:
    post:
      tags: [Conversations]
      summary: Reject an inbound chat request
      description: Marks the request rejected so the requester sees the rejection in their inbox.
      security:
        - SupabaseJwt: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [p_request_id]
              properties:
                p_request_id:
                  type: string
                  format: uuid
      responses:
        "200":
          description: Request UUID
          content:
            application/json:
              schema:
                type: string
                format: uuid
  /rest/v1/rpc/destroy_conversation_for_everyone:
    post:
      tags: [Conversations]
      summary: Destroy a conversation for all members
      description: Deletes the conversation, participants, legacy messages, device-encrypted messages, related accepted request state, and encrypted attachment objects for the conversation.
      security:
        - SupabaseJwt: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [p_conversation_id]
              properties:
                p_conversation_id:
                  type: string
                  format: uuid
      responses:
        "200":
          description: Destroyed conversation UUID
          content:
            application/json:
              schema:
                type: string
                format: uuid
  /rest/v1/rpc/list_chat_previews:
    post:
      tags: [Conversations]
      summary: List chat previews for current user
      description: Returns encrypted last-message body; preview text must be decrypted locally.
      security:
        - SupabaseJwt: []
      responses:
        "200":
          description: Chat preview rows
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChatPreviewRow"
  /rest/v1/rpc/set_conversation_auto_destroy:
    post:
      tags: [Conversations]
      summary: Set legacy conversation auto-destruction window
      security:
        - SupabaseJwt: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [p_conversation_id, p_seconds]
              properties:
                p_conversation_id:
                  type: string
                  format: uuid
                p_seconds:
                  type: integer
                  nullable: true
                  enum: [300, 900, 3600, 86400]
      responses:
        "204":
          description: Updated
  /rest/v1/rpc/set_conversation_high_risk:
    post:
      tags: [Conversations]
      summary: Toggle high-risk mode for a conversation
      security:
        - SupabaseJwt: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [p_conversation_id, p_enabled]
              properties:
                p_conversation_id:
                  type: string
                  format: uuid
                p_enabled:
                  type: boolean
      responses:
        "204":
          description: Updated
  /rest/v1/conversations:
    get:
      tags: [Conversations]
      summary: Fetch conversations for expired-conversation cleanup
      security:
        - SupabaseJwt: []
      parameters:
        - $ref: "#/components/parameters/Select"
        - in: query
          name: auto_destroy_at
          schema:
            type: string
            example: not.is.null
      responses:
        "200":
          description: Conversation rows
    delete:
      tags: [Conversations]
      summary: Delete/destroy a conversation
      security:
        - SupabaseJwt: []
      parameters:
        - in: query
          name: id
          schema:
            type: string
            example: eq.{conversation_id}
      responses:
        "204":
          description: Deleted
  /rest/v1/conversation_participants:
    get:
      tags: [Conversations]
      summary: Read legacy conversation participants and peer profiles
      security:
        - SupabaseJwt: []
      parameters:
        - $ref: "#/components/parameters/Select"
        - in: query
          name: conversation_id
          schema:
            type: string
            example: eq.{conversation_id}
        - in: query
          name: profile_id
          schema:
            type: string
            example: eq.{auth.user.id}
      responses:
        "200":
          description: Participant rows
  /rest/v1/conversation_members:
    get:
      tags: [Conversations]
      summary: Read v2 conversation membership and settings
      security:
        - SupabaseJwt: []
      parameters:
        - $ref: "#/components/parameters/Select"
        - in: query
          name: conversation_id
          schema:
            type: string
            example: eq.{conversation_id}
        - in: query
          name: left_at
          schema:
            type: string
            example: is.null
      responses:
        "200":
          description: Conversation members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ConversationMember"
    patch:
      tags: [Conversations]
      summary: Update own archive, pin, mute, read receipts, or disappearing-message settings
      security:
        - SupabaseJwt: []
      parameters:
        - in: query
          name: conversation_id
          schema:
            type: string
            example: eq.{conversation_id}
        - in: query
          name: user_id
          schema:
            type: string
            example: eq.{auth.user.id}
        - $ref: "#/components/parameters/PreferReturnRepresentation"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConversationMemberUpdate"
      responses:
        "200":
          description: Updated member settings

  /rest/v1/messages:
    get:
      tags: [LegacyMessages]
      summary: Fetch encrypted legacy messages for a conversation
      description: "`body` and `location_label` are ciphertext envelopes."
      security:
        - SupabaseJwt: []
      parameters:
        - $ref: "#/components/parameters/Select"
        - in: query
          name: conversation_id
          schema:
            type: string
            example: eq.{conversation_id}
        - in: query
          name: created_at
          schema:
            type: string
            example: lt.2026-04-30T00:00:00.000Z
        - $ref: "#/components/parameters/Order"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Legacy encrypted message rows
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LegacyMessage"
    post:
      tags: [LegacyMessages]
      summary: Send legacy encrypted message
      security:
        - SupabaseJwt: []
      parameters:
        - $ref: "#/components/parameters/PreferReturnRepresentation"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LegacyMessageCreate"
      responses:
        "201":
          description: Created message

  /rest/v1/encrypted_messages:
    get:
      tags: [DeviceEncryptedMessages]
      summary: Fetch messages for current recipient device
      description: "Reads only rows where `recipient_device_id` belongs to the authenticated user."
      security:
        - SupabaseJwt: []
      parameters:
        - $ref: "#/components/parameters/Select"
        - in: query
          name: recipient_device_id
          schema:
            type: string
            example: eq.{device_id}
        - $ref: "#/components/parameters/Order"
      responses:
        "200":
          description: Device-encrypted messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EncryptedMessage"
    post:
      tags: [DeviceEncryptedMessages]
      summary: Insert one ciphertext envelope for one recipient device
      security:
        - SupabaseJwt: []
      parameters:
        - $ref: "#/components/parameters/PreferReturnRepresentation"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EncryptedMessageCreate"
      responses:
        "201":
          description: Created encrypted message
    patch:
      tags: [DeviceEncryptedMessages]
      summary: Mark delivered/read or tombstone delete-for-everyone
      security:
        - SupabaseJwt: []
      parameters:
        - in: query
          name: id
          schema:
            type: string
            example: eq.{message_id}
        - $ref: "#/components/parameters/PreferReturnRepresentation"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - type: object
                  properties:
                    delivered_at:
                      type: string
                      format: date-time
                - type: object
                  properties:
                    read_at:
                      type: string
                      format: date-time
                - type: object
                  properties:
                    deleted_for_all_at:
                      type: string
                      format: date-time
                    ciphertext:
                      type: string
                      const: "[deleted]"
      responses:
        "200":
          description: Updated encrypted message

  /rest/v1/devices:
    get:
      tags: [Devices]
      summary: List own devices or public recipient device bundles
      security:
        - SupabaseJwt: []
      parameters:
        - $ref: "#/components/parameters/Select"
        - in: query
          name: user_id
          schema:
            type: string
            example: eq.{user_id}
        - in: query
          name: revoked_at
          schema:
            type: string
            example: is.null
      responses:
        "200":
          description: Device rows
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Device"
    post:
      tags: [Devices]
      summary: Register current device or upsert public key bundle
      security:
        - SupabaseJwt: []
      parameters:
        - $ref: "#/components/parameters/PreferResolutionMergeDuplicates"
        - $ref: "#/components/parameters/PreferReturnRepresentation"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeviceUpsert"
      responses:
        "201":
          description: Registered device
    patch:
      tags: [Devices]
      summary: Revoke current user's device
      security:
        - SupabaseJwt: []
      parameters:
        - in: query
          name: id
          schema:
            type: string
            example: eq.{device_id}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                revoked_at:
                  type: string
                  format: date-time
      responses:
        "200":
          description: Revoked device
  /rest/v1/prekeys:
    get:
      tags: [Devices]
      summary: Read public one-time prekeys
      security:
        - SupabaseJwt: []
      parameters:
        - $ref: "#/components/parameters/Select"
        - in: query
          name: device_id
          schema:
            type: string
            example: eq.{device_id}
        - in: query
          name: used_at
          schema:
            type: string
            example: is.null
      responses:
        "200":
          description: Public prekey rows
    post:
      tags: [Devices]
      summary: Upload public one-time prekeys for own device
      security:
        - SupabaseJwt: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/PreKeyCreate"
      responses:
        "201":
          description: Inserted prekeys
    patch:
      tags: [Devices]
      summary: Mark own prekey as used
      security:
        - SupabaseJwt: []
      parameters:
        - in: query
          name: id
          schema:
            type: string
            example: eq.{prekey_id}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                used_at:
                  type: string
                  format: date-time
      responses:
        "200":
          description: Updated prekey

  /rest/v1/blocked_users:
    get:
      tags: [Blocks]
      summary: List users blocked by current user
      security:
        - SupabaseJwt: []
      parameters:
        - $ref: "#/components/parameters/Select"
        - $ref: "#/components/parameters/Order"
      responses:
        "200":
          description: Block rows
    post:
      tags: [Blocks]
      summary: Block a user
      security:
        - SupabaseJwt: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [blocker_id, blocked_id]
              properties:
                blocker_id:
                  type: string
                  format: uuid
                blocked_id:
                  type: string
                  format: uuid
      responses:
        "201":
          description: Block created
    delete:
      tags: [Blocks]
      summary: Unblock a user
      security:
        - SupabaseJwt: []
      parameters:
        - in: query
          name: blocker_id
          schema:
            type: string
            example: eq.{auth.user.id}
        - in: query
          name: blocked_id
          schema:
            type: string
            example: eq.{blocked_user_id}
      responses:
        "204":
          description: Block removed

  /rest/v1/security_audit_events:
    post:
      tags: [Audit]
      summary: Insert local security/audit event
      security:
        - SupabaseJwt: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SecurityAuditEventCreate"
      responses:
        "201":
          description: Audit event created

  /storage/v1/object/{bucket}/{path}:
    post:
      tags: [Storage]
      summary: Upload encrypted attachment/blob
      description: "Used for `chat-attachments` and `encrypted-attachments`. Upload body must already be encrypted."
      security:
        - SupabaseJwt: []
      parameters:
        - $ref: "#/components/parameters/Bucket"
        - $ref: "#/components/parameters/ObjectPath"
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        "200":
          description: Uploaded object metadata
    get:
      tags: [Storage]
      summary: Download encrypted attachment/blob
      security:
        - SupabaseJwt: []
      parameters:
        - $ref: "#/components/parameters/Bucket"
        - $ref: "#/components/parameters/ObjectPath"
      responses:
        "200":
          description: Encrypted object bytes
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
    delete:
      tags: [Storage]
      summary: Remove encrypted attachment/blob
      security:
        - SupabaseJwt: []
      parameters:
        - $ref: "#/components/parameters/Bucket"
        - $ref: "#/components/parameters/ObjectPath"
      responses:
        "200":
          description: Removed object
  /storage/v1/object/sign/{bucket}/{path}:
    post:
      tags: [Storage]
      summary: Create signed URL for encrypted legacy attachment
      security:
        - SupabaseJwt: []
      parameters:
        - $ref: "#/components/parameters/Bucket"
        - $ref: "#/components/parameters/ObjectPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [expiresIn]
              properties:
                expiresIn:
                  type: integer
                  example: 60
      responses:
        "200":
          description: Signed URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  signedURL:
                    type: string
  /storage/v1/object/list/{bucket}:
    post:
      tags: [Storage]
      summary: List encrypted attachment paths under a prefix
      security:
        - SupabaseJwt: []
      parameters:
        - $ref: "#/components/parameters/Bucket"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                prefix:
                  type: string
                  example: "{conversation_id}"
                limit:
                  type: integer
                  example: 1000
                sortBy:
                  type: object
                  properties:
                    column:
                      type: string
                      example: name
                    order:
                      type: string
                      enum: [asc, desc]
      responses:
        "200":
          description: Storage object list

  /--/api/v2/push/send:
    post:
      tags: [ExpoPush]
      summary: Send Expo push notification
      description: Push body must remain generic and must not include plaintext message content.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExpoPushRequest"
      responses:
        "200":
          description: Expo push response

x-supabase-realtime:
  endpoint: wss://bmvbqmibvfsbkfkcdesv.supabase.co/realtime/v1/websocket
  transports:
    - websocket
  channels:
    - name: inbox:{userId}
      purpose: Refresh chat list and notify on new legacy messages
      postgres_changes:
        - table: messages
          event: INSERT
        - table: conversation_participants
          event: INSERT
    - name: conversation:{conversationId}
      purpose: Receive legacy encrypted message inserts for an open conversation
      postgres_changes:
        - table: messages
          event: INSERT
          filter: conversation_id=eq.{conversationId}
    - name: encrypted-inbox
      purpose: Receive v2 device-encrypted message inserts
      postgres_changes:
        - table: encrypted_messages
          event: INSERT
    - name: typing:{conversationId}
      purpose: Typing indicator. Broadcast/Presence only; no plaintext is persisted.
      broadcast_events:
        - typing
      presence:
        - userId

components:
  securitySchemes:
    SupabaseAnonKey:
      type: apiKey
      in: header
      name: apikey
      description: Public Supabase anon/publishable key.
    SupabaseJwt:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Supabase Auth access token.
  parameters:
    Select:
      in: query
      name: select
      schema:
        type: string
        example: "*"
    Order:
      in: query
      name: order
      schema:
        type: string
        example: created_at.desc
    Limit:
      in: query
      name: limit
      schema:
        type: integer
        example: 30
    PreferReturnRepresentation:
      in: header
      name: Prefer
      schema:
        type: string
        example: return=representation
    PreferResolutionMergeDuplicates:
      in: header
      name: Prefer
      schema:
        type: string
        example: resolution=merge-duplicates
    Bucket:
      in: path
      name: bucket
      required: true
      schema:
        type: string
        enum: [chat-attachments, encrypted-attachments]
    ObjectPath:
      in: path
      name: path
      required: true
      schema:
        type: string
        example: "{conversation_id}/{sender_id}/encrypted-file.enc"
  responses:
    AuthError:
      description: Supabase Auth error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          examples:
            invalidCredentials:
              value:
                code: invalid_credentials
                message: Invalid login credentials
  schemas:
    ApiError:
      type: object
