      required: [email, password, data]
      properties:
        email:
          type: string
          format: email
          description: Internal generated auth email derived from `hacker_handle`; never shown in product UI.
          example: operator@kripchat.invalid
        password:
          type: string
          format: password
        data:
          type: object
          required: [username, e2ee_public_key]
          properties:
            username:
              type: string
              description: Public `hacker_handle`.
              example: operator
            e2ee_public_key:
